# 冷水机组 CH-01 点表（字段含义见 points.yaml 顶部注释）
device:
  name: CH-01
  vendor: ACME-IoT
  unit_id: 1
modbus:
  host: 127.0.0.1
  port: 1503
polling:
  interval: 2.0
  timeout: 3.0
  reconnect_backoff: [1, 2, 5, 10]

points:
  # Holding registers
  - name: cooling_setpoint
    description: 出水温度设定值（可写）
    register_type: holding
    address: 0
    unit: "degC"
    scale: 10
    initial: 7.0
    min: 4.0
    max: 12.0
    writable: true
    simulation: { mode: static }
  - name: compressor_load
    description: 压缩机负载
    register_type: holding
    address: 1
    unit: "%"
    scale: 1
    initial: 65
    min: 0
    max: 100
    writable: false
    simulation: { mode: sine, amplitude: 25, period: 150, noise: 1 }
  - name: condenser_pressure
    description: 冷凝压力
    register_type: holding
    address: 2
    unit: "kPa"
    scale: 1
    initial: 1450
    min: 800
    max: 2200
    writable: false
    simulation: { mode: noise, noise: 12 }

  # Input registers
  - name: chw_supply_temp
    description: 冷冻水出水温度
    register_type: input
    address: 0
    unit: "degC"
    scale: 10
    initial: 7.2
    min: 3.0
    max: 15.0
    simulation: { mode: sine, amplitude: 1.2, period: 80, noise: 0.05 }
  - name: chw_return_temp
    description: 冷冻水回水温度
    register_type: input
    address: 1
    unit: "degC"
    scale: 10
    initial: 12.5
    min: 8.0
    max: 18.0
    simulation: { mode: sine, amplitude: 1.5, period: 110, noise: 0.05 }
  - name: evap_flow
    description: 蒸发器流量
    register_type: input
    address: 2
    unit: "m3/h"
    scale: 10
    initial: 180.0
    min: 0.0
    max: 300.0
    simulation: { mode: noise, noise: 2.0 }

  # Coils
  - name: chiller_run_cmd
    description: 机组启停命令（可写）
    register_type: coil
    address: 0
    initial: 1
    writable: true
    simulation: { mode: static }

  # Discrete inputs
  - name: compressor_status
    description: 压缩机运行状态
    register_type: discrete
    address: 0
    initial: 1
    simulation: { mode: static }
  - name: high_pressure_alarm
    description: 高压报警（周期触发便于观察）
    register_type: discrete
    address: 1
    initial: 0
    simulation: { mode: step, interval: 25 }
